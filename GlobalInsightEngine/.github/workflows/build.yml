name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # позволяет запустить вручную из GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK (signed with debug key)
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk output/GlobalInsightEngine-debug.apk
          cp app/build/outputs/apk/release/app-release.apk output/GlobalInsightEngine-release.apk 2>/dev/null || true

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlobalInsightEngine-APK
          path: output/*.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Global Insight Engine v1.0.${{ github.run_number }}"
          body: |
            ## 📱 Global Insight Engine APK
            
            Скачайте **GlobalInsightEngine-debug.apk** и установите на телефон.
            
            > При установке разрешите «Установку из неизвестных источников» в настройках.
          files: output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
