<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050810">
<title>Global Insight Engine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#050810;overflow-x:hidden}
  body{font-family:'DM Sans',system-ui,sans-serif;color:#e2e8f0;max-width:480px;margin:0 auto;position:relative}
  textarea,button,input{font-family:inherit}
  textarea:focus,input:focus{outline:none}
  button:active{transform:scale(0.96)}
  ::-webkit-scrollbar{width:3px}
  ::-webkit-scrollbar-track{background:#0a0f1e}
  ::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
  @keyframes fadeSlideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes glow{0%,100%{box-shadow:0 0 18px #00d4ff25}50%{box-shadow:0 0 36px #00d4ff45}}

  /* Ambient bg */
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse 70% 35% at 50% 0%,#00d4ff0a 0%,transparent 70%),
               radial-gradient(ellipse 50% 25% at 90% 100%,#7c3aed0a 0%,transparent 70%)}

  /* Header */
  header{position:sticky;top:0;z-index:50;padding:13px 18px;
    background:rgba(5,8,16,.85);backdrop-filter:blur(24px);
    border-bottom:1px solid #0f172a;display:flex;align-items:center;justify-content:space-between}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:38px;height:38px;border-radius:11px;
    background:linear-gradient(135deg,#00d4ff18,#7c3aed18);
    border:1px solid #00d4ff35;display:flex;align-items:center;
    justify-content:center;font-size:20px;animation:glow 3s ease-in-out infinite}
  .logo-text{display:flex;flex-direction:column}
  .logo-main{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#00d4ff;letter-spacing:.5px}
  .logo-sub{font-family:'Space Mono',monospace;font-size:9px;color:#334155;letter-spacing:2.5px;text-transform:uppercase}
  .live-badge{display:flex;align-items:center;gap:5px}
  .live-dot{width:6px;height:6px;border-radius:50%;background:#10b981;animation:pulse 2s infinite}
  .live-text{font-family:'Space Mono',monospace;font-size:10px;color:#334155}

  /* Tabs */
  .tabs{display:flex;border-bottom:1px solid #0f172a;position:sticky;top:64px;z-index:40;background:#050810}
  .tab{flex:1;padding:11px 0;background:none;border:none;border-bottom:2px solid transparent;
    color:#334155;font-size:13px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
  .tab.active{color:#00d4ff;border-bottom-color:#00d4ff}
  .tab-badge{background:#0f172a;border-radius:8px;padding:1px 5px;font-size:10px;color:#475569;font-family:'Space Mono',monospace}

  /* Main content */
  .content{padding:18px 14px 100px;position:relative;z-index:1}

  /* Input area */
  .input-box{background:#0a0f1e;border:1px solid #1e293b;border-radius:18px;padding:4px;margin-bottom:14px;transition:border-color .2s}
  .input-box:focus-within{border-color:#00d4ff35}
  textarea{width:100%;background:none;border:none;color:#e2e8f0;font-size:15px;line-height:1.6;padding:12px 14px 8px;resize:none}
  .input-footer{display:flex;align-items:center;justify-content:space-between;padding:0 10px 10px}
  .char-count{font-family:'Space Mono',monospace;font-size:10px;color:#1e293b}
  .btn-analyze{background:linear-gradient(135deg,#00b4d8,#0077b6);border:none;border-radius:11px;
    color:#fff;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;gap:6px;transition:all .2s}
  .btn-analyze:disabled{background:#0f172a;color:#334155;cursor:not-allowed}

  /* Quick topics */
  .section-label{font-size:10px;color:#334155;letter-spacing:2px;text-transform:uppercase;
    margin-bottom:10px;font-family:'Space Mono',monospace}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
  .chip{background:#0a0f1e;border:1px solid #1e293b;border-radius:20px;
    padding:6px 13px;color:#475569;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
  .chip:hover,.chip:active{border-color:#00d4ff30;color:#7dd3fc}

  /* Loading */
  .loading-card{background:#0a0f1e;border:1px solid #1e293b;border-radius:18px;
    padding:28px;text-align:center;animation:fadeSlideUp .4s ease}
  .loading-emoji{font-size:34px;margin-bottom:14px;display:block;animation:pulse 1.5s infinite}
  .loading-text{color:#00d4ff;font-size:13px;font-weight:600;font-family:'Space Mono',monospace;margin-bottom:6px}
  .loading-sub{color:#334155;font-size:12px}
  .loading-dots{display:flex;justify-content:center;gap:7px;margin-top:18px}
  .ldot{width:6px;height:6px;border-radius:50%}

  /* Error */
  .error-card{background:#1a0a0a;border:1px solid #ef444430;border-radius:14px;
    padding:14px 16px;color:#f87171;font-size:13px;line-height:1.5;animation:fadeSlideUp .4s ease}

  /* Result summary */
  .summary-card{background:linear-gradient(135deg,#0a0f1e,#0f172a);
    border:1px solid #1e40af35;border-radius:20px;padding:18px;margin-bottom:14px}
  .summary-inner{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .summary-tag{font-size:10px;color:#00d4ff;font-family:'Space Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
  .summary-title{font-size:17px;font-weight:700;color:#f1f5f9;line-height:1.35;margin-bottom:10px}
  .summary-text{color:#94a3b8;font-size:13px;line-height:1.65}
  .keywords{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
  .keyword{background:#00d4ff0d;border:1px solid #00d4ff20;border-radius:7px;
    padding:3px 9px;font-size:10px;color:#7dd3fc;font-family:'Space Mono',monospace}

  /* Score ring */
  .score-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:80px}
  .score-ring{position:relative;width:80px;height:80px}
  .score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .score-num{font-size:20px;font-weight:800;font-family:'Space Mono',monospace;line-height:1}
  .score-trend{font-size:16px;font-weight:700;line-height:1}
  .score-label{font-size:10px;color:#64748b;letter-spacing:1px;text-transform:uppercase;font-family:'Space Mono',monospace}

  /* Insight cards */
  .cards{display:flex;flex-direction:column;gap:9px}
  .insight-card{background:#0a0f1e;border:1px solid #1e293b;border-radius:14px;
    padding:14px 16px;cursor:pointer;transition:all .25s ease}
  .insight-card.open{background:#0f172a}
  .card-header{display:flex;align-items:center;justify-content:space-between}
  .card-icon-wrap{width:34px;height:34px;border-radius:9px;
    display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
  .card-meta{margin-left:10px;flex:1}
  .card-cat{font-size:11px;font-weight:700;letter-spacing:.5px}
  .card-title{font-size:13px;color:#cbd5e1;font-weight:600;margin-top:2px}
  .card-chevron{font-size:20px;color:#334155;transition:transform .25s;line-height:1}
  .card-body{margin-top:12px;padding-top:12px;animation:fadeSlideUp .3s ease}
  .card-content{color:#94a3b8;font-size:13px;line-height:1.65;margin-bottom:10px}
  .card-bullets{display:flex;flex-direction:column;gap:5px}
  .bullet{display:flex;gap:8px;align-items:flex-start}
  .bullet-dot{font-size:11px;margin-top:3px;flex-shrink:0}
  .bullet-text{color:#cbd5e1;font-size:13px;line-height:1.5}

  /* History */
  .hist-item{background:none;border:1px solid #1e293b;border-radius:12px;
    padding:11px 14px;cursor:pointer;text-align:left;width:100%;
    display:flex;align-items:center;gap:10px;transition:border-color .2s;font-family:inherit}
  .hist-item:hover{border-color:#334155}
  .hist-query{color:#94a3b8;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hist-title{color:#475569;font-size:11px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hist-score{flex-shrink:0;font-size:12px;font-weight:700;font-family:'Space Mono',monospace}

  .btn-new{width:100%;margin-top:14px;background:none;border:1px solid #1e293b;
    border-radius:14px;padding:13px;color:#475569;font-size:13px;font-weight:500;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px;transition:border-color .2s}
  .btn-new:hover{border-color:#334155}
  .btn-clear{width:100%;margin-top:16px;background:none;border:1px solid #ef444428;
    border-radius:12px;padding:12px;color:#ef4444;font-size:12px;font-weight:500;cursor:pointer}

  .empty-state{text-align:center;padding:60px 20px;color:#1e293b}
  .empty-emoji{font-size:40px;margin-bottom:12px}
  .empty-text{font-size:14px;color:#334155}
  .empty-sub{font-size:12px;color:#1e293b;margin-top:4px}

  .hidden{display:none}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🔭</div>
    <div class="logo-text">
      <span class="logo-main">GLOBAL</span>
      <span class="logo-sub">Insight Engine</span>
    </div>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    <span class="live-text">LIVE</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" id="tab-analyze" onclick="switchTab('analyze')">🔬 Анализ</button>
  <button class="tab" id="tab-history" onclick="switchTab('history')">🕐 История <span class="tab-badge" id="hist-count" style="display:none">0</span></button>
</div>

<div class="content">

  <!-- ANALYZE TAB -->
  <div id="pane-analyze">
    <div class="input-box">
      <textarea id="query-input" rows="3" maxlength="500"
        placeholder="Введите тему для глубокого анализа..."
        oninput="updateChar()" onkeydown="handleKey(event)"></textarea>
      <div class="input-footer">
        <span class="char-count" id="char-count">0/500</span>
        <button class="btn-analyze" id="btn-go" onclick="analyze()">⚡ Анализировать</button>
      </div>
    </div>

    <div id="quick-section">
      <div class="section-label">Быстрый старт</div>
      <div class="chips" id="chips"></div>
    </div>

    <div id="loading-state" class="loading-card hidden">
      <span class="loading-emoji">🌐</span>
      <div class="loading-text" id="loading-text">Сканирование данных...</div>
      <div class="loading-sub">Геополитика · Экономика · Технологии · Риски</div>
      <div class="loading-dots" id="ldots"></div>
    </div>

    <div id="error-state" class="error-card hidden"></div>

    <div id="result-state" class="hidden">
      <div class="summary-card">
        <div class="summary-inner">
          <div style="flex:1">
            <div class="summary-tag">Global Analysis</div>
            <div class="summary-title" id="res-title"></div>
            <div class="summary-text" id="res-summary"></div>
          </div>
          <div class="score-wrap">
            <div class="score-ring">
              <svg width="80" height="80" style="transform:rotate(-90deg);position:absolute;top:0;left:0">
                <circle cx="40" cy="40" r="34" fill="none" stroke="#1e293b" stroke-width="6"/>
                <circle id="score-arc" cx="40" cy="40" r="34" fill="none" stroke="#10b981"
                  stroke-width="6" stroke-linecap="round" stroke-dasharray="0 213.6"
                  style="transition:stroke-dasharray 1.2s cubic-bezier(.4,0,.2,1)"/>
              </svg>
              <div class="score-inner">
                <span class="score-num" id="score-num">0</span>
                <span class="score-trend" id="score-trend">→</span>
              </div>
            </div>
            <span class="score-label">Индекс</span>
          </div>
        </div>
        <div class="keywords" id="res-keywords"></div>
      </div>
      <div class="cards" id="res-cards"></div>
      <button class="btn-new" onclick="resetAnalysis()">+ Новый анализ</button>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div id="pane-history" class="hidden" style="animation:fadeSlideUp .4s ease">
    <div id="hist-empty" class="empty-state">
      <div class="empty-emoji">🕐</div>
      <div class="empty-text">История пуста</div>
      <div class="empty-sub">Выполните первый анализ</div>
    </div>
    <div id="hist-list" class="hidden">
      <div class="section-label" id="hist-label"></div>
      <div id="hist-items" style="display:flex;flex-direction:column;gap:8px"></div>
      <button class="btn-clear" onclick="clearHistory()">🗑 Очистить историю</button>
    </div>
  </div>

</div>

<script>
const CATEGORIES = [
  {id:"geo",label:"Геополитика",icon:"🌐",color:"#ef4444"},
  {id:"eco",label:"Экономика",icon:"📈",color:"#f59e0b"},
  {id:"tech",label:"Технологии",icon:"⚡",color:"#3b82f6"},
  {id:"social",label:"Общество",icon:"👥",color:"#8b5cf6"},
  {id:"risk",label:"Риски",icon:"⚠️",color:"#f97316"},
  {id:"outlook",label:"Прогноз",icon:"🔭",color:"#10b981"},
];

const QUICK = [
  "Искусственный интеллект 2025",
  "Геополитика Ближнего Востока",
  "Криптовалюты и регуляция",
  "Климатические изменения",
  "Мировая торговля и тарифы",
  "Энергетический кризис",
];

const SYSTEM = `Ты — Global Insight Engine. Анализируй тему по 6 измерениям.
Отвечай ТОЛЬКО валидным JSON без markdown-обёртки:
{"title":"...","summary":"...","score":0-100,"trend":"up|down|neutral",
"geo":{"title":"...","content":"...","bullets":["...","...","..."]},"eco":{"title":"...","content":"...","bullets":["...","...","..."]},"tech":{"title":"...","content":"...","bullets":["...","...","..."]},"social":{"title":"...","content":"...","bullets":["...","...","..."]},"risk":{"title":"...","content":"...","bullets":["...","...","..."]},"outlook":{"title":"...","content":"...","bullets":["...","...","..."]},"keywords":["...","...","...","...","..."]}`;

let history = [];
let dotTimer = null;
let dotCount = 0;
const CIRC = 2 * Math.PI * 34;

// Init
try { history = JSON.parse(localStorage.getItem("gie_apk") || "[]"); } catch(e){}
renderChips();
updateHistoryUI();

function renderChips() {
  const c = document.getElementById("chips");
  c.innerHTML = QUICK.map(t =>
    `<button class="chip" onclick="quickAnalyze('${t}')">${t}</button>`
  ).join("");
}

function updateChar() {
  const v = document.getElementById("query-input").value;
  document.getElementById("char-count").textContent = v.length + "/500";
  document.getElementById("btn-go").disabled = !v.trim();
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); analyze(); }
}

function quickAnalyze(t) {
  document.getElementById("query-input").value = t;
  updateChar();
  analyze();
}

function switchTab(tab) {
  ["analyze","history"].forEach(t => {
    document.getElementById("pane-"+t).classList.toggle("hidden", t !== tab);
    document.getElementById("tab-"+t).classList.toggle("active", t === tab);
  });
}

function show(id) { document.getElementById(id).classList.remove("hidden"); }
function hide(id) { document.getElementById(id).classList.add("hidden"); }

function startDots() {
  const colors = CATEGORIES.map(c => c.color);
  const ldots = document.getElementById("ldots");
  ldots.innerHTML = colors.map((c,i) =>
    `<div class="ldot" style="background:${c};animation:pulse 1.1s ${i*0.12}s infinite"></div>`
  ).join("");
  dotTimer = setInterval(() => {
    dotCount = (dotCount + 1) % 4;
    document.getElementById("loading-text").textContent = "Сканирование данных" + ".".repeat(dotCount);
  }, 400);
}

function stopDots() {
  clearInterval(dotTimer);
  dotTimer = null;
}

async function analyze() {
  const q = document.getElementById("query-input").value.trim();
  if (!q) return;

  hide("quick-section");
  hide("error-state");
  hide("result-state");
  show("loading-state");
  startDots();

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: SYSTEM,
        messages: [{ role: "user", content: `Проанализируй тему: "${q}"` }],
      }),
    });
    const data = await res.json();
    const raw = (data.content || []).map(c => c.text || "").join("");
    const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
    showResult(q, parsed);
  } catch(e) {
    hide("loading-state");
    show("error-state");
    document.getElementById("error-state").textContent = "⚠️ Ошибка анализа. Проверьте соединение и попробуйте снова.";
  } finally {
    stopDots();
  }
}

function showResult(q, r) {
  hide("loading-state");

  // Score ring
  const score = r.score || 0;
  const color = score > 70 ? "#ef4444" : score > 40 ? "#f59e0b" : "#10b981";
  const arc = document.getElementById("score-arc");
  arc.style.stroke = color;
  setTimeout(() => { arc.style.strokeDasharray = `${(score/100)*CIRC} ${CIRC}`; }, 100);
  document.getElementById("score-num").textContent = score;
  document.getElementById("score-num").style.color = color;
  const trendEl = document.getElementById("score-trend");
  trendEl.textContent = r.trend === "up" ? "↑" : r.trend === "down" ? "↓" : "→";
  trendEl.style.color = r.trend === "up" ? "#ef4444" : r.trend === "down" ? "#10b981" : "#94a3b8";

  document.getElementById("res-title").textContent = r.title || "";
  document.getElementById("res-summary").textContent = r.summary || "";

  // Keywords
  const kw = document.getElementById("res-keywords");
  kw.innerHTML = (r.keywords || []).map(k => `<span class="keyword">#${k}</span>`).join("");

  // Category cards
  const cards = document.getElementById("res-cards");
  cards.innerHTML = CATEGORIES.map((cat, i) => {
    const d = r[cat.id];
    if (!d) return "";
    return `
      <div class="insight-card" id="card-${cat.id}" onclick="toggleCard('${cat.id}')"
           style="animation-delay:${i*80}ms;animation:fadeSlideUp .5s ease both">
        <div class="card-header">
          <div class="card-icon-wrap" style="background:${cat.color}18">${cat.icon}</div>
          <div class="card-meta">
            <div class="card-cat" style="color:${cat.color}">${cat.label}</div>
            <div class="card-title">${d.title||""}</div>
          </div>
          <span class="card-chevron" id="chev-${cat.id}">›</span>
        </div>
        <div class="card-body hidden" id="body-${cat.id}" style="border-top:1px solid ${cat.color}25">
          <div class="card-content">${d.content||""}</div>
          <div class="card-bullets">${(d.bullets||[]).map(b =>
            `<div class="bullet"><span class="bullet-dot" style="color:${cat.color}">▸</span><span class="bullet-text">${b}</span></div>`
          ).join("")}</div>
        </div>
      </div>`;
  }).join("");

  show("result-state");

  // Save to history
  const entry = { query: q, result: r, ts: Date.now() };
  history = [entry, ...history.filter(h => h.query !== q)].slice(0, 15);
  try { localStorage.setItem("gie_apk", JSON.stringify(history)); } catch(e) {}
  updateHistoryUI();
}

function toggleCard(id) {
  const body = document.getElementById("body-"+id);
  const card = document.getElementById("card-"+id);
  const chev = document.getElementById("chev-"+id);
  const isOpen = !body.classList.contains("hidden");
  body.classList.toggle("hidden", isOpen);
  card.classList.toggle("open", !isOpen);
  chev.style.transform = isOpen ? "none" : "rotate(90deg)";
}

function resetAnalysis() {
  hide("result-state");
  show("quick-section");
  document.getElementById("query-input").value = "";
  document.getElementById("char-count").textContent = "0/500";
  document.getElementById("btn-go").disabled = true;
  document.getElementById("score-arc").style.strokeDasharray = `0 ${CIRC}`;
}

function updateHistoryUI() {
  const count = history.length;
  const badge = document.getElementById("hist-count");
  badge.textContent = count;
  badge.style.display = count > 0 ? "inline" : "none";

  if (count === 0) {
    show("hist-empty"); hide("hist-list");
  } else {
    hide("hist-empty"); show("hist-list");
    document.getElementById("hist-label").textContent = `Последние ${count} анализов`;
    const items = document.getElementById("hist-items");
    items.innerHTML = history.map((item, i) => {
      const s = item.result?.score || 0;
      const sc = s > 70 ? "#ef4444" : s > 40 ? "#f59e0b" : "#10b981";
      return `
        <button class="hist-item" onclick="loadHistory(${i})">
          <span style="font-size:14px;flex-shrink:0">🕐</span>
          <div style="flex:1;min-width:0">
            <div class="hist-query">${item.query}</div>
            <div class="hist-title">${item.result?.title||""}</div>
          </div>
          <div class="hist-score" style="color:${sc}">${s}</div>
        </button>`;
    }).join("");
  }
}

function loadHistory(i) {
  const item = history[i];
  document.getElementById("query-input").value = item.query;
  updateChar();
  showResult(item.query, item.result);
  switchTab("analyze");
}

function clearHistory() {
  history = [];
