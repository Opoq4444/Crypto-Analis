<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#050810">
<title>Crypto Intel AI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#050810;overflow-x:hidden}
body{font-family:'DM Sans',system-ui,sans-serif;color:#e2e8f0;max-width:480px;margin:0 auto}
button{font-family:inherit}
button:active{transform:scale(0.96)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px #00d4ff20}50%{box-shadow:0 0 40px #00d4ff40}}
header{position:sticky;top:0;z-index:50;padding:12px 16px;
  background:rgba(5,8,16,.92);backdrop-filter:blur(24px);
  border-bottom:1px solid #0f172a;display:flex;align-items:center;justify-content:space-between}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:22px;animation:glow 3s infinite}
.logo-main{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#00d4ff;letter-spacing:.5px}
.logo-sub{font-family:'Space Mono',monospace;font-size:9px;color:#334155;letter-spacing:2px}
.hdr-right{display:flex;align-items:center;gap:8px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#10b981;animation:pulse 2s infinite}
.upd{font-family:'Space Mono',monospace;font-size:9px;color:#334155}
.btn-ref{background:none;border:1px solid #1e293b;border-radius:8px;padding:4px 9px;color:#475569;font-size:12px;cursor:pointer}
.tabs{display:flex;border-bottom:1px solid #0f172a;background:#050810;position:sticky;top:60px;z-index:40}
.tab{flex:1;padding:11px 0;background:none;border:none;border-bottom:2px solid transparent;
  color:#334155;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.tab.active{color:#00d4ff;border-bottom-color:#00d4ff}
.content{padding:16px 14px 80px;position:relative;z-index:1}
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 40% at 50% 0%,#00d4ff08,transparent 65%),
             radial-gradient(ellipse 60% 30% at 85% 95%,#9945ff08,transparent 65%)}
.slabel{font-size:10px;color:#334155;letter-spacing:2px;text-transform:uppercase;
  margin-bottom:10px;font-family:'Space Mono',monospace}
.card{background:#0a0f1e;border:1px solid #1e293b;border-radius:16px;padding:14px 16px;transition:all .25s;animation:fadeUp .4s ease both}
.card.open{background:#0f172a}
.fg-card{background:#0a0f1e;border:1px solid #1e293b;border-radius:16px;
  padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.fg-val{font-family:'Space Mono',monospace;font-size:22px;font-weight:900}
.fg-lbl{font-size:11px;margin-top:2px}
.bar-track{width:100%;height:3px;background:#1e293b;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .8s ease}
.fg-leg{display:flex;justify-content:space-between;margin-top:4px}
.fg-leg span{font-size:9px;color:#334155}
.coin-row{display:flex;align-items:center;gap:10px}
.coin-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.coin-inf{flex:1}
.coin-top{display:flex;justify-content:space-between;align-items:center}
.coin-sym{font-family:'Space Mono',monospace;font-size:13px;font-weight:700}
.coin-nm{font-size:11px;color:#475569;margin-left:5px}
.coin-pr{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:#f1f5f9}
.coin-bot{display:flex;justify-content:space-between;margin-top:4px}
.coin-vol{font-size:11px;color:#475569}
.coin-ch{font-size:12px;font-weight:700}
.exc-sec{margin-top:12px;padding-top:12px}
.exc-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.exc-nm{font-size:12px;color:#64748b}
.exc-pr{font-family:'Space Mono',monospace;font-size:12px;color:#cbd5e1}
.mbar{width:50px;height:3px;background:#1e293b;border-radius:2px;overflow:hidden;margin:0 8px}
.mbarf{height:100%;border-radius:2px;transition:width .6s ease}
.spread{margin-top:6px;font-size:11px;color:#f59e0b}
.btn-go{width:100%;margin-top:18px;border:none;border-radius:14px;padding:15px;
  font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.btn-go.on{background:linear-gradient(135deg,#00d4ff,#0077b6);color:#fff}
.btn-go.off{background:#0f172a;color:#334155;cursor:not-allowed}
.hint{text-align:center;font-size:11px;color:#334155;margin-top:8px}
.spin{border-radius:50%;border-style:solid;animation:spin .8s linear infinite;flex-shrink:0}
.agent-card{background:#0a0f1e;border:1px solid #1e293b;border-radius:14px;padding:12px 14px;transition:all .3s}
.agent-row{display:flex;align-items:center;gap:10px}
.aico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.anm{font-size:13px;font-weight:700}
.adesc{font-size:11px;color:#334155;margin-top:1px}
.abody{margin-top:12px;padding-top:12px;animation:fadeUp .3s ease}
.abadge{display:inline-block;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700;margin-bottom:10px;border:1px solid}
.asum{color:#94a3b8;font-size:13px;line-height:1.65;margin-bottom:10px}
.blt{display:flex;gap:7px;margin-bottom:5px}
.bltd{font-size:11px;margin-top:2px;flex-shrink:0}
.bltt{color:#cbd5e1;font-size:13px;line-height:1.5}
.final-card{border-radius:20px;padding:20px;margin-top:16px;animation:fadeUp .5s ease;
  background:linear-gradient(135deg,#0a0f1e,#0f172a)}
.final-in{display:flex;align-items:center;gap:16px}
.ring-w{position:relative;width:80px;height:80px;flex-shrink:0}
.ring-in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:10px;font-family:'Space Mono',monospace;font-weight:700}
.stag{font-size:10px;color:#475569;letter-spacing:2px;text-transform:uppercase;font-family:'Space Mono',monospace;margin-bottom:4px}
.sval{font-size:28px;font-weight:900;font-family:'Space Mono',monospace;letter-spacing:2px}
.stf{font-size:11px;color:#64748b;margin-top:2px}
.fsum{color:#94a3b8;font-size:13px;line-height:1.65;margin-top:14px;border-top:1px solid #1e293b;padding-top:12px}
.tgts{display:flex;gap:10px;margin-top:12px}
.tgt{flex:1;background:#0a0f1e;border-radius:10px;padding:8px 10px;text-align:center}
.tgt-lbl{font-size:10px;color:#475569;margin-bottom:2px}
.tgt-val{font-size:13px;font-weight:700;font-family:'Space Mono',monospace}
.rbox{margin-top:12px;background:#1a0a0a;border:1px solid #ef444428;border-radius:10px;padding:10px 12px}
.rlbl{font-size:10px;color:#ef4444;letter-spacing:1.5px;text-transform:uppercase;font-family:'Space Mono',monospace;margin-bottom:6px}
.ri{font-size:12px;color:#f87171;line-height:1.5;margin-bottom:2px}
.disc{font-size:10px;color:#1e293b;margin-top:12px;text-align:center}
.empty{text-align:center;padding:50px 20px}
.empty-ico{font-size:40px;margin-bottom:12px}
.empty-txt{font-size:14px;color:#334155}
.btn-back{margin-top:16px;background:none;border:1px solid #1e293b;border-radius:12px;padding:10px 20px;color:#475569;font-size:13px;cursor:pointer}
.btn-rerun{width:100%;margin-top:16px;background:none;border:1px solid #1e293b;border-radius:14px;padding:13px;color:#475569;font-size:13px;cursor:pointer}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="ambient"></div>
<header>
  <div class="logo-wrap">
    <span class="logo-icon">📡</span>
    <div><div class="logo-main">CRYPTO INTEL</div><div class="logo-sub">AI MARKET ANALYSIS</div></div>
  </div>
  <div class="hdr-right">
    <span class="upd" id="upd"></span>
    <div class="live-dot" id="ldot"></div>
    <button class="btn-ref" onclick="loadMarket()">↻</button>
  </div>
</header>
<div class="tabs">
  <button class="tab active" id="tab-market" onclick="sw('market')">📊 Рынок</button>
  <button class="tab" id="tab-ai" onclick="sw('ai')">🤖 AI Анализ</button>
</div>
<div class="content">
  <div id="pane-market">
    <div class="fg-card">
      <div>
        <div class="slabel" style="margin-bottom:6px">Fear &amp; Greed</div>
        <div class="fg-val" id="fgv" style="color:#f59e0b">—</div>
        <div class="fg-lbl" id="fgl" style="color:#f59e0b">Загрузка...</div>
      </div>
      <div style="width:80px">
        <div class="bar-track"><div class="bar-fill" id="fgf" style="width:50%;background:#f59e0b"></div></div>
        <div class="fg-leg"><span>Страх</span><span>Жадность</span></div>
      </div>
    </div>
    <div class="slabel">Активы · нажмите для бирж</div>
    <div id="clist" style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px"></div>
    <button class="btn-go on" id="bgo" onclick="startAI()">🤖 Запустить AI-анализ</button>
    <div class="hint">5 AI-агентов · Новости · Киты · Геополитика · Техника</div>
  </div>
  <div id="pane-ai" class="hidden">
    <div id="ai-empty" class="empty">
      <div class="empty-ico">🤖</div>
      <div class="empty-txt">Запустите анализ на вкладке Рынок</div>
      <button class="btn-back" onclick="sw('market')">← На рынок</button>
    </div>
    <div id="ai-run" class="hidden">
      <div class="slabel" id="aistatus">Агенты работают...</div>
      <div id="alist" style="display:flex;flex-direction:column;gap:9px"></div>
      <div id="fsig"></div>
      <button class="btn-rerun hidden" id="brerun" onclick="startAI()">↻ Обновить анализ</button>
    </div>
  </div>
</div>
<script>
const COINS=[
  {id:"bitcoin", sym:"BTC",color:"#f7931a",bg:"#f7931a18",icon:"₿",name:"Bitcoin"},
  {id:"ethereum",sym:"ETH",color:"#627eea",bg:"#627eea18",icon:"Ξ",name:"Ethereum"},
  {id:"ripple",  sym:"XRP",color:"#00aae4",bg:"#00aae418",icon:"✕",name:"XRP"},
  {id:"solana",  sym:"SOL",color:"#9945ff",bg:"#9945ff18",icon:"◎",name:"Solana"},
  {id:"gold",    sym:"XAU",color:"#ffd700",bg:"#ffd70018",icon:"⬡",name:"Gold"},
];
const AGENTS=[
  {id:"news", name:"News Agent",   icon:"📰",color:"#3b82f6",desc:"Последние новости крипты"},
  {id:"whale",name:"Whale Tracker",icon:"🐋",color:"#8b5cf6",desc:"Крупные сделки и киты"},
  {id:"geo",  name:"Geo Agent",    icon:"🌍",color:"#ef4444",desc:"Геополитика и конфликты"},
  {id:"tech", name:"Tech Agent",   icon:"📊",color:"#f59e0b",desc:"Технический анализ"},
  {id:"final",name:"Signal AI",    icon:"🎯",color:"#10b981",desc:"Итоговая рекомендация"},
];
let prices={},exc={},fg=null,analyzing=false,ares={};

function sw(t){
  ["market","ai"].forEach(x=>{
    document.getElementById("pane-"+x).classList.toggle("hidden",x!==t);
    document.getElementById("tab-"+x).classList.toggle("active",x===t);
  });
}
function fmt(n,d=2){
  if(n==null)return"—";
  if(n>=1e9)return"$"+(n/1e9).toFixed(1)+"B";
  if(n>=1e6)return"$"+(n/1e6).toFixed(0)+"M";
  return"$"+n.toLocaleString("en",{minimumFractionDigits:d,maximumFractionDigits:d});
}
function pct(n){return n==null?"—":(n>0?"+":"")+n.toFixed(2)+"%"}
function pc(n){return n>0?"#10b981":n<0?"#ef4444":"#94a3b8"}
function spn(c="#00d4ff",s=16){return`<div class="spin" style="width:${s}px;height:${s}px;border-width:2px;border-color:${c}30;border-top-color:${c}"></div>`}

async function loadMarket(){
  document.getElementById("ldot").style.background="#f59e0b";
  await Promise.all([loadPrices(),loadFG(),loadExc()]);
  document.getElementById("ldot").style.background="#10b981";
  document.getElementById("upd").textContent=new Date().toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"});
}
async function loadPrices(){
  try{
    const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,ripple,solana&vs_currencies=usd&include_24hr_change=true&include_24hr_vol=true&include_market_cap=true");
    prices=await r.json();
  }catch{}
  renderCoins();
}
async function loadFG(){
  try{
    const r=await fetch("https://api.alternative.me/fng/?limit=1");
    const d=await r.json();
    fg=d.data?.[0];
  }catch{}
  if(fg){
    const v=parseInt(fg.value);
    const c=v>60?"#10b981":v>40?"#f59e0b":"#ef4444";
    document.getElementById("fgv").textContent=v;
    document.getElementById("fgv").style.color=c;
    document.getElementById("fgl").textContent=fg.value_classification;
    document.getElementById("fgl").style.color=c;
    document.getElementById("fgf").style.width=v+"%";
    document.getElementById("fgf").style.background=c;
  }
}
async function loadExc(){
  exc={};
  for(const s of["BTC","ETH"]){
    const o={};
    try{const r=await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${s}USDT`);const d=await r.json();if(d.price)o.Binance=+d.price;}catch{}
    try{const r=await fetch(`https://api.bybit.com/v5/market/tickers?category=spot&symbol=${s}USDT`);const d=await r.json();const p=d.result?.list?.[0]?.lastPrice;if(p)o.Bybit=+p;}catch{}
    try{const ks=s==="BTC"?"XBTUSD":`${s}USD`;const r=await fetch(`https://api.kraken.com/0/public/Ticker?pair=${ks}`);const d=await r.json();const k=Object.keys(d.result||{})[0];if(k)o.Kraken=+d.result[k].c[0];}catch{}
    exc[s]=o;
  }
  renderCoins();
}
function renderCoins(){
  const el=document.getElementById("clist");
  el.innerHTML=COINS.map(coin=>{
    const d=coin.id==="gold"?{usd:null,usd_24h_change:null,usd_24h_vol:null}:prices[coin.id];
    const e=exc[coin.sym]||{};
    const arr=Object.values(e);
    const spread=arr.length>1?Math.max(...arr)-Math.min(...arr):0;
    const minP=arr.length?Math.min(...arr):0;
    const maxS=spread||1;
    const excHtml=Object.keys(e).length?`
      <div class="exc-sec" style="border-top:1px solid ${coin.color}25">
        <div class="slabel" style="margin-bottom:8px">Биржи</div>
        ${Object.entries(e).map(([ex,p])=>`<div class="exc-row">
          <span class="exc-nm">${ex}</span>
          <div style="display:flex;align-items:center;flex:1;justify-content:flex-end">
            <div class="mbar"><div class="mbarf" style="width:${Math.min(100,((p-minP)/maxS)*100)}%;background:${coin.color}"></div></div>
            <span class="exc-pr">${fmt(p)}</span>
          </div></div>`).join("")}
        ${spread>0?`<div class="spread">⚡ Спред: $${spread.toFixed(2)}</div>`:""}
      </div>`:"";
    return`<div class="card" id="c${coin.sym}" onclick="tc('${coin.sym}','${coin.color}')" style="cursor:pointer">
      <div class="coin-row">
        <div class="coin-ico" style="background:${coin.bg};color:${coin.color}">${coin.icon}</div>
        <div class="coin-inf">
          <div class="coin-top">
            <div><span class="coin-sym" style="color:${coin.color}">${coin.sym}</span><span class="coin-nm">${coin.name}</span></div>
            ${d?.usd?`<span class="coin-pr">${fmt(d.usd)}</span>`:spn(coin.color,14)}
          </div>
          <div class="coin-bot">
            <span class="coin-vol">Vol: ${d?.usd_24h_vol?fmt(d.usd_24h_vol):"—"}</span>
            ${d?.usd_24h_change!=null?`<span class="coin-ch" style="color:${pc(d.usd_24h_change)}">${pct(d.usd_24h_change)}</span>`:""}
          </div>
        </div>
      </div>
      <div id="ex${coin.sym}" class="hidden">${excHtml}</div>
    </div>`;
  }).join("");
}
function tc(sym,color){
  const el=document.getElementById("ex"+sym);
  const card=document.getElementById("c"+sym);
  const open=!el.classList.contains("hidden");
  el.classList.toggle("hidden",open);
  card.classList.toggle("open",!open);
  card.style.borderColor=open?"#1e293b":color+"55";
}

async function callClaude(prompt,search=true){
  const body={
    model:"claude-sonnet-4-20250514",max_tokens:1000,
    system:"Ты — профессиональный крипто-аналитик. Отвечай ТОЛЬКО валидным JSON без markdown.",
    messages:[{role:"user",content:prompt}],
  };
  if(search)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)
  });
  const data=await res.json();
  const txt=(data.content||[]).filter(c=>c.type==="text").map(c=>c.text).join("");
  try{return JSON.parse(txt.replace(/```json|```/g,"").trim());}
  catch{return{raw:txt};}
}

function setAgent(id,status,result){
  const a=AGENTS.find(x=>x.id===id);
  const sc=status==="done"?a.color:status==="running"?"#94a3b8":"#334155";
  let body="";
  if(result&&status==="done"){
    const sg=result.signal;
    const sc2=sg==="BUY"?"#10b981":sg==="SELL"?"#ef4444":"#f59e0b";
    body=`<div class="abody" style="border-top:1px solid ${a.color}25">
      ${sg?`<div class="abadge" style="background:${sc2}20;border-color:${sc2};color:${sc2}">${sg}</div>`:""}
      ${result.summary?`<div class="asum">${result.summary}</div>`:""}
      ${(result.points||[]).map(p=>`<div class="blt"><span class="bltd" style="color:${a.color}">▸</span><span class="bltt">${p}</span></div>`).join("")}
      ${result.raw?`<div style="color:#64748b;font-size:12px;line-height:1.6;font-family:monospace">${result.raw.slice(0,400)}</div>`:""}
    </div>`;
  }
  const html=`<div class="agent-card" id="ac${id}" style="border-color:${status==="done"?a.color+"44":"#1e293b"}">
    <div class="agent-row" style="cursor:${result?"pointer":"default"}" onclick="ta('${id}','${a.color}')">
      <div class="aico" style="background:${sc}18">${a.icon}</div>
      <div style="flex:1"><div class="anm" style="color:${sc}">${a.name}</div><div class="adesc">${a.desc}</div></div>
      ${status==="running"?spn(a.color):""}
      ${status==="done"?`<span style="color:${a.color};font-size:16px">✓</span>`:""}
      ${result&&status==="done"?`<span id="chv${id}" style="color:#334155;font-size:16px;transition:transform .2s">›</span>`:""}
    </div>
    <div id="ab${id}" class="hidden">${body}</div>
  </div>`;
  const ex=document.getElementById("ac"+id);
  if(ex)ex.outerHTML=html; else document.getElementById("alist").insertAdjacentHTML("beforeend",html);
}
function ta(id,color){
  const b=document.getElementById("ab"+id);
  const ch=document.getElementById("chv"+id);
  if(!b)return;
  const open=!b.classList.contains("hidden");
  b.classList.toggle("hidden",open);
  if(ch)ch.style.transform=open?"none":"rotate(90deg)";
}

function showFinal(r){
  if(!r)return;
  const sig=r.signal||"WAIT";
  const conf=r.confidence||50;
  const color=sig==="BUY"?"#10b981":sig==="SELL"?"#ef4444":"#f59e0b";
  const C=2*Math.PI*30;
  document.getElementById("fsig").innerHTML=`
    <div class="final-card" style="border:1px solid ${color}44">
      <div class="final-in">
        <div class="ring-w">
          <svg width="80" height="80" style="transform:rotate(-90deg);position:absolute;top:0;left:0">
            <circle cx="40" cy="40" r="30" fill="none" stroke="#1e293b" stroke-width="6"/>
            <circle cx="40" cy="40" r="30" fill="none" stroke="${color}" stroke-width="6"
              stroke-linecap="round" stroke-dasharray="${(conf/100)*C} ${C}"/>
          </svg>
          <div class="ring-in"><span class="ring-pct" style="color:${color}">${conf}%</span></div>
        </div>
        <div>
          <div class="stag">AI Signal</div>
          <div class="sval" style="color:${color}">${sig}</div>
          <div class="stf">${r.timeframe||"краткосрочно"}</div>
        </div>
      </div>
      ${r.summary?`<div class="fsum">${r.summary}</div>`:""}
      ${r.targets?.length?`<div class="tgts">${r.targets.map(t=>`<div class="tgt"><div class="tgt-lbl">${t.label}</div><div class="tgt-val" style="color:${t.label.includes("Цель")?color:"#ef4444"}">${t.value}</div></div>`).join("")}</div>`:""}
      ${r.risks?.length?`<div class="rbox"><div class="rlbl">Риски</div>${r.risks.map(x=>`<div class="ri">• ${x}</div>`).join("")}</div>`:""}
      <div class="disc">⚠️ Не является финансовым советом. DYOR.</div>
    </div>`;
}

async function startAI(){

  analyzing=true; ares={};
  sw("ai");
  document.getElementById("ai-empty").classList.add("hidden");
  document.getElementById("ai-run").classList.remove("hidden");
  document.getElementById("aistatus").textContent="AI агенты работают...";

  document.getElementById("fsig").innerHTML="";

  AGENTS.forEach(a=>setAgent(a.id,"waiting",null));

  const btc=prices.bitcoin,eth=prices.ethereum;

    ares.whale=r; setAgent("whale","done",r);
  }catch(e){setAgent("whale","done",{raw:"Ошибка: "+e.message});}

  setAgent("geo","running",null);

    ares.geo=r; setAgent("geo","done",r);
  }catch(e){setAgent("geo","done",{raw:"Ошибка: "+e.message});}

  setAgent("tech","running",null);
  try{
    const e=exc.BTC||{};
    const r=await callClaude(`Технический анализ BTC и ETH: уровни поддержки/сопротивления, RSI, объёмы, паттерны на графике. Цены на биржах BTC: ${JSON.stringify(e)}. Контекст: ${ctx}. JSON: {"summary":"...","points":["...","...","..."],"trend":"bullish|bearish|sideways","signal":"BUY|SELL|WAIT","support":"$число","resistance":"$число"}`);
    ares.tech=r; setAgent("tech","done",r);
  }catch(e){setAgent("tech","done",{raw:"Ошибка: "+e.message});}

  setAgent("final","running",null);
  try{
    const r=await callClaude(`Ты главный AI-аналитик. Синтезируй данные в финальную торговую рекомендацию.
Рынок: ${ctx}
Новости: сигнал ${ares.news?.signal||"?"}, настроение ${ares.news?.sentiment||"?"}

Геополитика: риск ${ares.geo?.risk_level||"?"}, сигнал ${ares.geo?.signal||"?"}
Техника: тренд ${ares.tech?.trend||"?"}, поддержка ${ares.tech?.support||"?"}, сопротивление ${ares.tech?.resistance||"?"}
JSON: {"signal":"BUY|SELL|WAIT","confidence":0-100,"timeframe":"1-4 часа / 1-3 дня","summary":"подробное объяснение","targets":[{"label":"Цель 1","value":"$..."},{"label":"Стоп","value":"$..."}],"risks":["риск 1","риск 2"]}`,false);
