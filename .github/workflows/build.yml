name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # Docker-контейнер с полным Android SDK — никаких проблем с установкой
    runs-on: ubuntu-22.04
    container:
      image: thyrlian/android-sdk:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/platforms/
          ls $ANDROID_HOME/build-tools/
          java -version
          gradle --version || true

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" || \
          sdkmanager "platforms;android-33" "build-tools;33.0.3"

      - name: Update compileSdk to match installed
        run: |
          # Use android-33 as fallback if 34 unavailable
          if ls $ANDROID_HOME/platforms/android-34 2>/dev/null; then
            echo "Using compileSdk 34"
          else
            echo "Falling back to compileSdk 33"
            sed -i 's/compileSdk 34/compileSdk 33/' GlobalInsightEngine/app/build.gradle
            sed -i 's/targetSdk 34/targetSdk 33/' GlobalInsightEngine/app/build.gradle
          fi
          cat GlobalInsightEngine/app/build.gradle

      - name: Generate Gradle wrapper
        run: |
          cd GlobalInsightEngine
          gradle wrapper --gradle-version=8.4 --distribution-type=bin
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd GlobalInsightEngine
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: List APK
        run: find GlobalInsightEngine -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GlobalInsightEngine-APK
          path: GlobalInsightEngine/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
