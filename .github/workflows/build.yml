name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Verify Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/platforms/
          ls $ANDROID_HOME/build-tools/
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Build Debug APK
        id: build
        continue-on-error: true
        working-directory: GlobalInsightEngine
        run: |
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
          echo "CODE=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: ✅ Upload APK (if success)
        if: steps.build.outputs.CODE == '0'
        uses: actions/upload-artifact@v4
        with:
          name: GlobalInsightEngine-APK
          path: GlobalInsightEngine/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 🤖 Create Copilot Issue (if failed)
        if: steps.build.outputs.CODE != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LOG=$(grep -E "error:|FAILED|Exception|Could not|Task :app" /tmp/build.log | head -60)
          FULL_LOG=$(tail -100 /tmp/build.log)

          ISSUE_URL=$(gh issue create \
            --title "🔧 Fix: Android APK build fails — assign to Copilot" \
            --body "## Build Failed — Needs Fix

          **Project:** \`GlobalInsightEngine/\` — Android WebView app  
          **Goal:** Make \`gradle assembleDebug\` succeed and produce \`app-debug.apk\`

          ## Key errors
          \`\`\`
          ${LOG}
          \`\`\`

          ## Full log (last 100 lines)
          \`\`\`
          ${FULL_LOG}
          \`\`\`

          ## Files
          - \`GlobalInsightEngine/build.gradle\` 
          - \`GlobalInsightEngine/app/build.gradle\`
          - \`GlobalInsightEngine/settings.gradle\`
          - \`GlobalInsightEngine/app/src/main/AndroidManifest.xml\`
          - \`.github/workflows/build.yml\`

          **Assign to Copilot** to auto-fix → it will create a PR.")

          echo "Issue created: $ISSUE_URL"
          exit 1

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7
