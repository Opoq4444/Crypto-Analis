name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: SDK check
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null | tail -5
          ls $ANDROID_HOME/platforms/ 2>/dev/null | tail -5
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.6.4'
          cache-disabled: true

      - name: Build APK
        id: build
        continue-on-error: true
        working-directory: GlobalInsightEngine
        run: |
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
          echo "CODE=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload APK ✅
        if: steps.build.outputs.CODE == '0'
        uses: actions/upload-artifact@v4
        with:
          name: GlobalInsightEngine-APK
          path: GlobalInsightEngine/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7

      - name: Create issue on failure
        if: steps.build.outputs.CODE != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import subprocess, os
          with open('/tmp/build.log') as f:
              log = f.read()
          errors = '\n'.join([l for l in log.splitlines() if any(w in l for w in ['error:','FAILED','Exception','Could not','BUILD'])])
          body = f"## Build Failed\n\n```\n{errors[-2000:] or log[-2000:]}\n```\n\nFix: `GlobalInsightEngine/` Android project."
          with open('/tmp/body.md','w') as f:
              f.write(body)
          r = subprocess.run(['gh','issue','create','--title','Fix APK build','--body-file','/tmp/body.md'], capture_output=True, text=True, env=os.environ)
          print(r.stdout, r.stderr)
          PYEOF
          exit 1
