name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install SDK platform 34
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses || true

      - name: Extract real gradle-wrapper.jar from Gradle distribution
        run: |
          cd GlobalInsightEngine
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          cd /tmp && unzip -q gradle.zip
          JAR=$(find /tmp/gradle-8.4 -name "gradle-wrapper*.jar" | head -1)
          echo "Found jar: $JAR ($(du -h $JAR | cut -f1))"
          cp "$JAR" $GITHUB_WORKSPACE/GlobalInsightEngine/gradle/wrapper/gradle-wrapper.jar
          ls -lh $GITHUB_WORKSPACE/GlobalInsightEngine/gradle/wrapper/

      - name: Build Debug APK
        run: |
          cd GlobalInsightEngine
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -80

      - name: Find APK
        run: find GlobalInsightEngine -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GlobalInsightEngine-APK
          path: GlobalInsightEngine/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
