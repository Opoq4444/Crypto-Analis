name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-disabled: true

      - name: Generate Gradle wrapper
        run: |
          cd GlobalInsightEngine
          gradle wrapper --gradle-version=8.4 --distribution-type=bin
          chmod +x gradlew

      - name: Build Debug APK
        id: build
        continue-on-error: true
        run: |
          cd GlobalInsightEngine
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
          echo "STATUS=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload APK ✅
        if: steps.build.outputs.STATUS == '0'
        uses: actions/upload-artifact@v4
        with:
          name: GlobalInsightEngine-APK
          path: GlobalInsightEngine/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Если билд упал — создаём Issue и назначаем Copilot Agent
      - name: Create Copilot Issue on failure 🤖
        if: steps.build.outputs.STATUS != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ERRORS=$(grep -A3 "FAILURE\|error:\|Exception\|Could not\|BUILD FAILED" /tmp/build.log | head -80 || tail -80 /tmp/build.log)
          
          gh issue create \
            --title "🔧 [Auto] Fix Android APK build failure — assign to Copilot" \
            --body "## ❌ Build failed automatically
          
          **Workflow:** Build APK  
          **File:** \`GlobalInsightEngine/\` (Android Gradle project)  
          **Goal:** Build a working \`app-debug.apk\`
          
          ## 🔍 Error log
          \`\`\`
          ${ERRORS}
          \`\`\`
          
          ## 📁 Key files to fix
          - \`GlobalInsightEngine/app/build.gradle\` — compileSdk, dependencies
          - \`GlobalInsightEngine/build.gradle\` — AGP version
          - \`GlobalInsightEngine/settings.gradle\` — repo config
          - \`GlobalInsightEngine/app/src/main/AndroidManifest.xml\` — app manifest
          - \`.github/workflows/build.yml\` — CI workflow
          
          ## ✅ Fix needed
          Please fix the Gradle/Android build configuration so \`./gradlew assembleDebug\` succeeds and produces an APK.
          
          _Assign this issue to **Copilot** to auto-fix._"
          
          echo "✅ Issue created! Go to github.com/Opoq4444/Crypto-Analis/issues and assign it to Copilot"
          exit 1
