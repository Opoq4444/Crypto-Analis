name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ubuntu-22.04 уже имеет Android SDK в /usr/local/lib/android/sdk
      - name: Check pre-installed SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/platforms/ 2>/dev/null && echo "Platforms OK" || echo "No platforms"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null && echo "Build-tools OK" || echo "No build-tools"

      - name: Install SDK components if needed
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_HOME/cmdline-tools/10.0/bin/sdkmanager"
          fi
          yes | $SDKMANAGER --licenses 2>/dev/null || true
          $SDKMANAGER "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-disabled: true

      - name: Build Debug APK
        working-directory: GlobalInsightEngine
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/platforms/ || true
          ls $ANDROID_HOME/build-tools/ || true
          gradle assembleDebug --no-daemon --stacktrace 2>&1

      - name: Find APK
        run: find . -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GlobalInsightEngine-APK
          path: GlobalInsightEngine/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
