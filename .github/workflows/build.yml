name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          echo "SDK components installed"

      - name: Extract real gradle-wrapper.jar
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          JAR=$(find /tmp/gradle-8.4 -name "gradle-wrapper*.jar" | head -1)
          echo "Wrapper jar: $JAR ($(du -h $JAR | cut -f1))"
          cp "$JAR" GlobalInsightEngine/gradle/wrapper/gradle-wrapper.jar
          ls -lh GlobalInsightEngine/gradle/wrapper/

      - name: Build Debug APK
        run: |
          set -e
          cd GlobalInsightEngine
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Find all APKs
        if: always()
        run: |
          echo "=== All APKs ==="
          find GlobalInsightEngine -name "*.apk" 2>/dev/null || echo "No APKs found"
          echo "=== Build dir ==="
          ls -la GlobalInsightEngine/app/build/outputs/ 2>/dev/null || echo "No outputs dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GlobalInsightEngine-APK
          path: GlobalInsightEngine/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
