name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-disabled: true

      - name: Debug — Android SDK info
        run: |
          echo "=== ANDROID_HOME ===" | tee -a /tmp/build.log
          echo "$ANDROID_HOME" | tee -a /tmp/build.log
          echo "=== Platforms ===" | tee -a /tmp/build.log
          ls $ANDROID_HOME/platforms/ 2>&1 | tee -a /tmp/build.log
          echo "=== Build-tools ===" | tee -a /tmp/build.log
          ls $ANDROID_HOME/build-tools/ 2>&1 | tee -a /tmp/build.log
          echo "=== Gradle version ===" | tee -a /tmp/build.log
          gradle --version 2>&1 | tee -a /tmp/build.log

      - name: Accept SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 | tail -5 | tee -a /tmp/build.log || true

      - name: Generate Gradle wrapper
        run: |
          cd GlobalInsightEngine
          gradle wrapper --gradle-version=8.4 --distribution-type=bin 2>&1 | tee -a /tmp/build.log
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd GlobalInsightEngine
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee -a /tmp/build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "Build exit code: $BUILD_EXIT" | tee -a /tmp/build.log
          exit $BUILD_EXIT

      - name: Find APK
        if: success()
        run: find . -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GlobalInsightEngine-APK
          path: GlobalInsightEngine/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build log (always — for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7
