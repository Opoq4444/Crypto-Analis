name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mingc/android-build-box:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          ln -sf /opt/gradle-8.4/bin/gradle /usr/local/bin/gradle
          gradle --version

      - name: Fix wrapper jar
        run: |
          cd GlobalInsightEngine
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/g.zip
          unzip -q /tmp/g.zip gradle-8.4/lib/plugins/gradle-wrapper-*.jar -d /tmp/ 2>/dev/null || true
          # Just remove wrapper, use installed gradle directly
          echo "Gradle ready"

      - name: Build Debug APK
        run: |
          cd GlobalInsightEngine
          gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: /opt/android-sdk-linux
          ANDROID_SDK_ROOT: /opt/android-sdk-linux

      - name: List output
        run: find GlobalInsightEngine -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GlobalInsightEngine-APK
          path: GlobalInsightEngine/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
