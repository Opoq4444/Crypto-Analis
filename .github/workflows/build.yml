name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.4 manually
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Accept Android SDK licenses & install components
        run: |
          # Pre-installed Android SDK path on ubuntu-latest runner
          export ANDROID_HOME=${ANDROID_HOME:-/usr/local/lib/android/sdk}
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          
          # Install required components
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>/dev/null || \
          ${ANDROID_HOME}/cmdline-tools/*/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0"
          
          # Accept all licenses
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Build Debug APK
        run: |
          cd GlobalInsightEngine
          gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Find APK
        run: find GlobalInsightEngine -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GlobalInsightEngine-APK
          path: GlobalInsightEngine/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
