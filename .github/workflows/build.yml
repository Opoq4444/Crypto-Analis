name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & build-tools
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses || true

      - name: Build Debug APK
        working-directory: GlobalInsightEngine
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: List generated APK
        run: find GlobalInsightEngine -name "*.apk" | xargs ls -lh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlobalInsightEngine-APK
          path: GlobalInsightEngine/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
